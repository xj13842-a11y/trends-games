name: Game/Meme Trends Monitor

on:
  schedule:
    # Every 6 hours (UTC: 00:00, 06:00, 12:00, 18:00)
    - cron: "0 */6 * * *"
  workflow_dispatch: # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trends monitor
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GEO: ${{ vars.GEO || 'US' }}
        run: python trends_games.py

      - name: Commit updated seen_terms.json
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_terms.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update seen terms [skip ci]"
            git push
          fi
